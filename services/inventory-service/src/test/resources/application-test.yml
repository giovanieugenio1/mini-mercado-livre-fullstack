spring:
  kafka:
    bootstrap-servers: ${spring.embedded.kafka.brokers}
    consumer:
      auto-offset-reset: earliest
    producer:
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:9999/realms/mini-mercado-livre/protocol/openid-connect/certs

  data:
    redis:
      host: localhost
      port: 6379

app:
  outbox:
    publish-delay-ms: 500
  inventory:
    lock-ttl-seconds: 5

logging:
  level:
    com.miniml.inventory: DEBUG
    org.springframework.kafka: WARN
