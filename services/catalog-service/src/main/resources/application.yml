server:
  port: 8081

spring:
  application:
    name: catalog-service

  # ── Banco de dados ───────────────────────────────────────────
  datasource:
    url: jdbc:postgresql://localhost:5432/catalog_db
    username: catalog_user
    password: catalog_pass
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate 
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # ── Flyway ───────────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  # ── Redis / Cache ────────────────────────────────────────────
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  cache:
    type: redis

  # ── Segurança (Resource Server) ──────────────────────────────
  # Usa jwk-set-uri (sem OIDC discovery no startup) + valida iss manualmente
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:8080/realms/mini-mercado-livre/protocol/openid-connect/certs

# ── Actuator + Prometheus ─────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}
      service: catalog
  # ── Tracing (OpenTelemetry → Jaeger OTLP HTTP) ────────────
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: http://localhost:4318/v1/traces

# ── Logging ──────────────────────────────────────────────────
logging:
  level:
    root: INFO
    com.miniml.catalog: DEBUG
  pattern:
    console: "%d{HH:mm:ss.SSS} %-5level [%X{traceId:-},${spring.application.name}] %logger{30} — %msg%n"
