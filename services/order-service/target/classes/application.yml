server:
  port: 8082

spring:
  application:
    name: order-service

  # ── Banco de dados ───────────────────────────────────────────
  datasource:
    url: jdbc:postgresql://localhost:5433/order_db
    username: order_user
    password: order_pass
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

  # ── Kafka ────────────────────────────────────────────────────
  kafka:
    bootstrap-servers: localhost:9094   # EXTERNAL listener (host)
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all                         # garante durabilidade
      retries: 3
      properties:
        enable.idempotence: true
    consumer:
      group-id: order-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      enable-auto-commit: false         # commit manual (at-least-once)
    listener:
      ack-mode: RECORD                  # commit após cada registro processado

  # ── Segurança ────────────────────────────────────────────────
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:8080/realms/mini-mercado-livre/protocol/openid-connect/certs

# ── Actuator + Prometheus ─────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: http://localhost:4318/v1/traces

# ── App config ────────────────────────────────────────────────
app:
  outbox:
    publish-delay-ms: 1000    # Scheduler do Outbox Publisher

logging:
  level:
    root: INFO
    com.miniml.order: DEBUG
  pattern:
    console: "%d{HH:mm:ss.SSS} %-5level [%X{traceId:-},${spring.application.name}] %logger{30} — %msg%n"
