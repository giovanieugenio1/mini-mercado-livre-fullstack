spring:
  kafka:
    bootstrap-servers: ${spring.embedded.kafka.brokers}
    consumer:
      auto-offset-reset: earliest
    producer:
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:9999/realms/mini-mercado-livre/protocol/openid-connect/certs

app:
  outbox:
    publish-delay-ms: 500

logging:
  level:
    com.miniml.shipping: DEBUG
    org.springframework.kafka: WARN
