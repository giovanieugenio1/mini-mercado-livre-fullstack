server:
  port: 8079

spring:
  application:
    name: api-gateway

  # ── Segurança (Resource Server) ────────────────────────────────
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:8080/realms/mini-mercado-livre/protocol/openid-connect/certs

  # ── Spring Cloud Gateway ────────────────────────────────────────
  cloud:
    gateway:

      # ── Rotas ─────────────────────────────────────────────────
      # Convenção: /api/v1/{recurso}/** → StripPrefix=2 → /{recurso}/**
      routes:

        # catalog-service (porta 8081)
        - id: catalog-service
          uri: ${CATALOG_URL:http://localhost:8081}
          predicates:
            - Path=/api/v1/products/**
          filters:
            - StripPrefix=2

        # order-service (porta 8082)
        - id: order-service
          uri: ${ORDER_URL:http://localhost:8082}
          predicates:
            - Path=/api/v1/orders/**
          filters:
            - StripPrefix=2

        # payment-service (porta 8083)
        - id: payment-service
          uri: ${PAYMENT_URL:http://localhost:8083}
          predicates:
            - Path=/api/v1/payments/**
          filters:
            - StripPrefix=2

        # inventory-service — estoque (porta 8084)
        - id: inventory-service-stock
          uri: ${INVENTORY_URL:http://localhost:8084}
          predicates:
            - Path=/api/v1/inventory/**
          filters:
            - StripPrefix=2

        # inventory-service — reservas (porta 8084)
        - id: inventory-service-reservations
          uri: ${INVENTORY_URL:http://localhost:8084}
          predicates:
            - Path=/api/v1/reservations/**
          filters:
            - StripPrefix=2

        # shipping-service (porta 8085)
        - id: shipping-service
          uri: ${SHIPPING_URL:http://localhost:8085}
          predicates:
            - Path=/api/v1/shippings/**
          filters:
            - StripPrefix=2

        # notification-service (porta 8086)
        - id: notification-service
          uri: ${NOTIFICATION_URL:http://localhost:8086}
          predicates:
            - Path=/api/v1/notifications/**
          filters:
            - StripPrefix=2

        # ── Rotas para agregação do Swagger UI ─────────────────────
        - id: catalog-api-docs
          uri: ${CATALOG_URL:http://localhost:8081}
          predicates:
            - Path=/api-docs/catalog
          filters:
            - RewritePath=/api-docs/catalog, /v3/api-docs

        - id: order-api-docs
          uri: ${ORDER_URL:http://localhost:8082}
          predicates:
            - Path=/api-docs/order
          filters:
            - RewritePath=/api-docs/order, /v3/api-docs

        - id: payment-api-docs
          uri: ${PAYMENT_URL:http://localhost:8083}
          predicates:
            - Path=/api-docs/payment
          filters:
            - RewritePath=/api-docs/payment, /v3/api-docs

        - id: inventory-api-docs
          uri: ${INVENTORY_URL:http://localhost:8084}
          predicates:
            - Path=/api-docs/inventory
          filters:
            - RewritePath=/api-docs/inventory, /v3/api-docs

        - id: shipping-api-docs
          uri: ${SHIPPING_URL:http://localhost:8085}
          predicates:
            - Path=/api-docs/shipping
          filters:
            - RewritePath=/api-docs/shipping, /v3/api-docs

        - id: notification-api-docs
          uri: ${NOTIFICATION_URL:http://localhost:8086}
          predicates:
            - Path=/api-docs/notification
          filters:
            - RewritePath=/api-docs/notification, /v3/api-docs

# ── Actuator + Prometheus ───────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics,gateway
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
    gateway:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}
      service: gateway
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: http://localhost:4318/v1/traces

# ── Logging ────────────────────────────────────────────────────
logging:
  level:
    root: INFO
    com.miniml.gateway: DEBUG
    org.springframework.cloud.gateway: INFO
  pattern:
    console: "%d{HH:mm:ss.SSS} %-5level [%X{traceId:-},${spring.application.name}] %logger{30} — %msg%n"

# ── Swagger UI Agregado ─────────────────────────────────────────
# Acesse: http://localhost:8079/swagger-ui.html
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: Catalog Service
        url: /api-docs/catalog
      - name: Order Service
        url: /api-docs/order
      - name: Payment Service
        url: /api-docs/payment
      - name: Inventory Service
        url: /api-docs/inventory
      - name: Shipping Service
        url: /api-docs/shipping
      - name: Notification Service
        url: /api-docs/notification
  # api-docs.enabled=true (padrão) é obrigatório: ativa os handlers de
  # /v3/api-docs/swagger-config e os recursos estáticos do swagger-ui.
