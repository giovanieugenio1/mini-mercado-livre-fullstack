<nav class="navbar">
  <div class="nav-container">
    <a routerLink="/products" class="nav-brand">
      Mini Mercado Livre
    </a>
    <div class="nav-links">
      <a routerLink="/products" routerLinkActive="active" class="nav-link">Produtos</a>
      @if (auth.isLoggedIn()) {
        <a routerLink="/orders" routerLinkActive="active" class="nav-link">Meus Pedidos</a>
      }
      <a routerLink="/cart" routerLinkActive="active" class="nav-link cart-link">
        Carrinho
        @if (cart.count() > 0) {
          <span class="cart-badge">{{ cart.count() }}</span>
        }
      </a>
    </div>
    <div class="nav-auth">
      @if (auth.isLoggedIn()) {
        <span class="nav-user">Olá, {{ auth.firstName() || auth.username() }}</span>
        <button class="btn btn-outline" (click)="auth.logout()">Sair</button>
      } @else {
        <a routerLink="/register" class="btn btn-outline">Cadastre-se</a>
        <a routerLink="/login" class="btn btn-primary">Entrar</a>
      }
    </div>
  </div>
</nav>
