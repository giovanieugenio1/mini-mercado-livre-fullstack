version: "3.8"

# =============================================================
# Mini Mercado Livre — Infraestrutura Local
# Kafka (KRaft), PostgreSQL por serviço, Redis, Keycloak,
# Prometheus, Grafana, Jaeger (OTLP), Kafka-UI
# =============================================================

networks:
  mini-ml-net:
    driver: bridge

volumes:
  catalog-db-data:
  order-db-data:
  payment-db-data:
  inventory-db-data:
  shipping-db-data:
  notification-db-data:
  user-db-data:
  kafka-data:
  redis-data:
  prometheus-data:
  grafana-data:

services:

  # ────────────────────────────────────────────────────────────
  # DATABASES  (1 PostgreSQL por serviço — database-per-service)
  # Portas host: 5432-5437  →  5432 dentro do container
  # ────────────────────────────────────────────────────────────

  catalog-db:
    image: postgres:15-alpine
    container_name: catalog-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: catalog_db
      POSTGRES_USER: catalog_user
      POSTGRES_PASSWORD: catalog_pass
    ports:
      - "5432:5432"
    volumes:
      - catalog-db-data:/var/lib/postgresql/data
    networks:
      - mini-ml-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U catalog_user -d catalog_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  order-db:
    image: postgres:15-alpine
    container_name: order-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: order_db
      POSTGRES_USER: order_user
      POSTGRES_PASSWORD: order_pass
    ports:
      - "5433:5432"
    volumes:
      - order-db-data:/var/lib/postgresql/data
    networks:
      - mini-ml-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U order_user -d order_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  payment-db:
    image: postgres:15-alpine
    container_name: payment-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: payment_db
      POSTGRES_USER: payment_user
      POSTGRES_PASSWORD: payment_pass
    ports:
      - "5434:5432"
    volumes:
      - payment-db-data:/var/lib/postgresql/data
    networks:
      - mini-ml-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payment_user -d payment_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  inventory-db:
    image: postgres:15-alpine
    container_name: inventory-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: inventory_db
      POSTGRES_USER: inventory_user
      POSTGRES_PASSWORD: inventory_pass
    ports:
      - "5435:5432"
    volumes:
      - inventory-db-data:/var/lib/postgresql/data
    networks:
      - mini-ml-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inventory_user -d inventory_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  shipping-db:
    image: postgres:15-alpine
    container_name: shipping-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: shipping_db
      POSTGRES_USER: shipping_user
      POSTGRES_PASSWORD: shipping_pass
    ports:
      - "5436:5432"
    volumes:
      - shipping-db-data:/var/lib/postgresql/data
    networks:
      - mini-ml-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shipping_user -d shipping_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  notification-db:
    image: postgres:15-alpine
    container_name: notification-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: notification_db
      POSTGRES_USER: notification_user
      POSTGRES_PASSWORD: notification_pass
    ports:
      - "5437:5432"
    volumes:
      - notification-db-data:/var/lib/postgresql/data
    networks:
      - mini-ml-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notification_user -d notification_db"]
      interval: 10s
      timeout: 5s
      retries: 5


  user-db:
    image: postgres:15-alpine
    container_name: user-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: user_db
      POSTGRES_USER: user_user
      POSTGRES_PASSWORD: user_pass
    ports:
      - "5438:5432"
    volumes:
      - user-db-data:/var/lib/postgresql/data
    networks:
      - mini-ml-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user_user -d user_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ────────────────────────────────────────────────────────────
  # KAFKA  (Apache 3.9.2 — KRaft mode, sem ZooKeeper)
  # Porta 9092: uso interno entre containers (PLAINTEXT)
  # Porta 9094: acesso pelo host / serviços locais (EXTERNAL)
  # ────────────────────────────────────────────────────────────

  kafka:
    image: apache/kafka:3.9.2
    container_name: kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
      - "9094:9094"
    environment:
      # KRaft — sem ZooKeeper
      # Nota: apache/kafka usa KAFKA_<PROPERTY> (sem prefixo CFG_)
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      # Listeners
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      # Configurações de tópicos
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_RETENTION_HOURS: 48
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - mini-ml-net
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # Job único: cria todos os tópicos de domínio
  kafka-init:
    image: apache/kafka:3.9.2
    container_name: kafka-init
    restart: "no"
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - mini-ml-net
    volumes:
      - ./kafka/init-topics.sh:/init-topics.sh:ro
    entrypoint: ["/bin/bash", "/init-topics.sh"]

  # Kafka UI — console web para explorar tópicos e mensagens
  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: kafka-ui
    restart: unless-stopped
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: mini-ml-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - mini-ml-net

  # ────────────────────────────────────────────────────────────
  # REDIS  (lock de estoque, cache, idempotência)
  # ────────────────────────────────────────────────────────────

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - mini-ml-net
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ────────────────────────────────────────────────────────────
  # KEYCLOAK 24  (OIDC Identity Provider)
  # Admin UI: http://localhost:8080
  # Realm:    mini-mercado-livre
  # ────────────────────────────────────────────────────────────

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: keycloak
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_LOG_LEVEL: info
    command: start-dev --import-realm
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    networks:
      - mini-ml-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health/ready || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 20
      start_period: 90s

  # ────────────────────────────────────────────────────────────
  # PROMETHEUS  (coleta métricas dos serviços via /actuator/prometheus)
  # UI: http://localhost:9090
  # ────────────────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle"
    # Necessário no Linux para alcançar serviços no host
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - mini-ml-net

  # ────────────────────────────────────────────────────────────
  # GRAFANA  (dashboards de métricas)
  # UI: http://localhost:3001  (admin / admin)
  # ────────────────────────────────────────────────────────────

  grafana:
    image: grafana/grafana:10.4.2
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_INSTALL_PLUGINS: grafana-clock-panel
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - mini-ml-net

  # ────────────────────────────────────────────────────────────
  # JAEGER  (distributed tracing via OpenTelemetry / OTLP)
  # UI:        http://localhost:16686
  # OTLP gRPC: localhost:4317
  # OTLP HTTP: localhost:4318
  # ────────────────────────────────────────────────────────────

  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: jaeger
    restart: unless-stopped
    ports:
      - "16686:16686"   # Jaeger UI
      - "4317:4317"     # OTLP gRPC  (Spring Boot → Jaeger)
      - "4318:4318"     # OTLP HTTP  (Spring Boot → Jaeger)
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
      SPAN_STORAGE_TYPE: memory
      MEMORY_MAX_TRACES: 50000
      QUERY_BASE_PATH: /
    networks:
      - mini-ml-net

  # ────────────────────────────────────────────────────────────
  # USER-SERVICE  (cadastro de usuários via Keycloak Admin API)
  # Porta 8087
  # ────────────────────────────────────────────────────────────
  # Inicie manualmente: cd services/user-service && mvn spring-boot:run
  # (sem imagem Docker pré-construída — projeto local Maven)
